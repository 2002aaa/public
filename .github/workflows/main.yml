name: EWS Daily Report

on:
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-ews:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pandas numpy matplotlib requests yfinance

      - run: python ews_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
